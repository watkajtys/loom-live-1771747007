<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LofiLoom Warm Solar Theme Variant 1</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FFB74D","primary-dark": "#F57C00","background-dark": "#1F150A","solar-deep": "#2D1B0E",},
                    fontFamily: {
                        "display": ["Nunito", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1rem", "2xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 183, 77, 0.2);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 183, 77, 0.4);
        }
        .glass-panel {
            background: rgba(45, 27, 14, 0.4);backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.1);box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .glass-panel-deep {
            background: rgba(45, 27, 14, 0.75);backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-top: 1px solid rgba(255, 215, 0, 0.15);}
        input[type=range] {
            -webkit-appearance: none; 
            background: transparent; 
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: #FFB74D;
            cursor: pointer;
            margin-top: -5px; 
            box-shadow: 0 0 10px rgba(255, 183, 77, 0.8);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }
        input[type=range]:focus {
            outline: none; 
        }
        @keyframes pulse-warm {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 183, 77, 0.2); }
            50% { box-shadow: 0 0 25px rgba(255, 160, 0, 0.5); }
        }
        .glow-ring {
            animation: pulse-warm 4s infinite ease-in-out;
        }
        .text-glow {
             text-shadow: 0 0 10px rgba(255, 183, 77, 0.5);
        }
    </style>
</head>

<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>LofiLoom Workspace Layout Variant 1</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00E5FF", 
                        "primary-dark": "#00B8D4",
                        "background-dark": "#0A121F",
                        "navy-deep": "#050A14",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "1rem", "2xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .glass-panel {
            background: rgba(5, 10, 20, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }
        .glass-panel-deep {
            background: rgba(5, 10, 20, 0.7);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }input[type=range] {
            -webkit-appearance: none; 
            background: transparent; 
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: #00E5FF;
            cursor: pointer;
            margin-top: -5px; 
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.6);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }
        input[type=range]:focus {
            outline: none; 
        }
        @keyframes pulse-soft {
            0%, 100% { box-shadow: 0 0 15px rgba(0, 229, 255, 0.1); }
            50% { box-shadow: 0 0 25px rgba(0, 229, 255, 0.3); }
        }
        .glow-ring {
            animation: pulse-soft 4s infinite ease-in-out;
        }
    </style>
</head>
<body class="font-display bg-background-dark text-slate-100 h-screen w-screen overflow-hidden relative">
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-navy-deep/40 backdrop-blur-sm z-10 pointer-events-none"></div>
<img alt="Cozy lofi room at night with warm lighting and rain on window" class="w-full h-full object-cover object-center opacity-80" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBosZAJlFTxMatHrTF2WIFoqQ6fFaBAMQjElr-YK7hFPiuNA2JXB97BB90XlV1PIIxuQmmGC0RAYVlqKHvHcw8ANMgfCCqCIBBG0yyCFWqtT32sqnp10oOUI0WqHdUV0YbUl4RGr9Qr3A6Ra2u6ngFPK52hdXG2d16pTX_qzaAyP-4mXvA4_uVNbXcvVTgcHTCimfjSugVtdcDiBuw_PL2gRlNh39ty321Zb_TfCOpv_eThVjQVlPQmASVyKv2VVQack-y0Ih_wfNI"/>
</div>
<nav class="fixed top-0 left-0 right-0 z-50 h-16 flex items-center justify-between px-8 bg-gradient-to-b from-black/60 to-transparent">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-3xl drop-shadow-[0_0_8px_rgba(0,229,255,0.6)]">headphones</span>
<span class="text-white font-bold text-lg tracking-wide uppercase">LofiLoom</span>
</div>
<div class="flex items-center gap-6">

<span>Session: 45m</span>
</div>

</div>
</div>
</div>
</nav>
<div class="relative z-20 h-full w-full flex flex-col justify-between pt-16 pb-32 px-8">
<div class="flex-1 flex w-full">
<div class="hidden lg:block lg:w-2/3"></div>
<div class="w-full lg:w-1/3 flex flex-col items-center justify-center lg:items-end lg:justify-start lg:pt-12">
<div class="glass-panel rounded-2xl p-8 w-full max-w-md flex flex-col items-center relative overflow-hidden transition-all hover:border-white/10">
<div class="relative size-64 flex items-center justify-center mb-8">
<div class="absolute inset-0 rounded-full border border-white/5"></div>
<svg class="absolute inset-0 size-full -rotate-90 transform glow-ring rounded-full" viewBox="0 0 256 256">
<circle cx="128" cy="128" fill="none" r="116" stroke="#1e293b" stroke-width="2"></circle>
<circle class="drop-shadow-[0_0_8px_rgba(0,229,255,0.5)]" cx="128" cy="128" fill="none" r="116" stroke="#00E5FF" stroke-dasharray="728" stroke-dashoffset="182" stroke-linecap="round" stroke-width="3"></circle>
</svg>
<div class="flex flex-col items-center z-10">
<span class="text-7xl font-light text-white tracking-tighter tabular-nums drop-shadow-xl" style="font-feature-settings: 'tnum' on, 'lnum' on;">25:00</span>
<span class="text-primary text-xs uppercase tracking-[0.2em] mt-2 font-semibold">Focus Mode</span>
</div>
</div>
<div class="flex items-center gap-6 w-full justify-center">
<button class="text-slate-400 hover:text-white transition-colors p-2 rounded-full hover:bg-white/5">

</button>
<button class="h-14 w-14 rounded-full bg-white text-black flex items-center justify-center shadow-[0_0_20px_rgba(255,255,255,0.3)] hover:scale-105 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-3xl filled" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
<button class="text-slate-400 hover:text-white transition-colors p-2 rounded-full hover:bg-white/5">
<span class="material-symbols-outlined text-2xl">stop</span>
</button>
</div>
<div class="flex bg-black/20 rounded-lg p-1 mt-8 w-full">
<button class="flex-1 py-2 text-xs font-medium text-white bg-white/10 rounded shadow-sm">Focus</button>
<button class="flex-1 py-2 text-xs font-medium text-slate-400 hover:text-white transition-colors">Short</button>
<button class="flex-1 py-2 text-xs font-medium text-slate-400 hover:text-white transition-colors">Long</button>

</div>
</div>
</div>
</div>
<div class="fixed bottom-0 left-0 right-0 z-40 glass-panel-deep px-8 py-6 flex flex-col md:flex-row items-center justify-between gap-8 h-auto md:h-28 shadow-2xl">

<div class="flex flex-col">

</div>
<div class="flex-1 w-full flex items-center justify-center gap-4 md:gap-8 overflow-x-auto pb-2 md:pb-0 px-4 scrollbar-hide">
<div class="flex flex-col items-center gap-2 min-w-[80px] group">
<div class="flex items-center gap-2 mb-1 opacity-60 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-lg text-blue-300">water_drop</span>
<span class="text-[10px] uppercase tracking-wider font-semibold text-blue-100">Rain</span>
</div>
<input class="w-32 h-1 bg-white/10 rounded-lg appearance-none cursor-pointer accent-blue-400 hover:bg-white/20 transition-colors" max="100" min="0" type="range" value="75"/>
</div>
<div class="flex flex-col items-center gap-2 min-w-[80px] group">
<div class="flex items-center gap-2 mb-1 opacity-60 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-lg text-orange-300">storefront</span>
<span class="text-[10px] uppercase tracking-wider font-semibold text-orange-100">Cafe</span>

</div>
<button class="text-slate-400 hover:text-white transition-colors ml-2">
<span class="material-symbols-outlined">fullscreen</span>
</button>
</div>
</div>

</body></html>

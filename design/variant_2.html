        input[type=range]::-webkit-slider-runnable-track {

            cursor: pointer;

            border: 1px solid rgba(0, 255, 157, 0.2);
        }
        input[type=range]:focus {

        }
        @keyframes pulse-neon {

                stroke: #00FF9D;

<html lang="en"><head>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "ice-blue": "#E0F7FA",
                        "frost-white": "#F0F8FF",
                        "electric-blue": "#00B0FF",
                        "silver-accent": "#B0BEC5",
                        "text-primary": "#263238",
                        "text-secondary": "#546E7A",
                        "background-light": "#E3F2FD",
                    },
                    fontFamily: {
                        "display": ["JetBrains Mono", "monospace"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "2xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 176, 255, 0.2);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 176, 255, 0.4);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(176, 190, 197, 0.2);
        }
        .glass-panel-deep {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(45px);
            -webkit-backdrop-filter: blur(45px);
            border-top: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.05);
        }
        input[type=range] {
            -webkit-appearance: none; 
            background: transparent; 
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 0;background: #00B0FF;
            cursor: pointer;
            margin-top: -5px; 
            box-shadow: 0 0 8px rgba(0, 176, 255, 0.5);
            border: 1px solid #fff;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: rgba(38, 50, 56, 0.1);
            border-radius: 0;
        }
        input[type=range]:focus {
            outline: none; 
        }
        @keyframes pulse-crisp {
            0%, 100% { box-shadow: 0 0 10px rgba(0, 176, 255, 0.2); }
            50% { box-shadow: 0 0 20px rgba(0, 176, 255, 0.5); }
        }
        .glow-ring {
            animation: pulse-crisp 4s infinite ease-in-out;
        }
    </style>
</head>
